<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Customer Portal (ข้อมูลลูกค้า)</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f6fbff; --ink:#0f172a; --mut:#64748b; --card:#ffffff; --border:#e6eef5;
    --accent:#0ea5a5; --accent2:#60a5fa; --radius:16px;
    --ok:#065f46; --okbg:#ecfdf5;
    --warn:#b45309; --warnbg:#fff7ed;
    --exp:#b91c1c; --expbg:#fff1f2;
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family:"Prompt",ui-sans-serif,system-ui; color:var(--ink); background:
    radial-gradient(1000px 500px at 10% -10%, #e6f7ff 0%, transparent 60%),
    radial-gradient(900px 450px at 110% 0%, #e8fff6 0%, transparent 60%),
    #f6fbff;
  }
  .wrap{max-width:1200px;margin:22px auto;padding:0 14px}
  .card{
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
    padding:18px; box-shadow:0 8px 28px rgba(10,30,60,.06); margin-bottom:14px
  }
  .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center}
  .spacer{flex:1}
  .mut{color:var(--mut)}
  
  input,button{ padding:12px 14px; border-radius:12px; border:1px solid var(--border); background:#fff; font-size:16px }
  .btn{ cursor:pointer; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; font-weight:700; border:none }
  .btn-ghost{background:#fff; color:#0e7490; border:1px solid #94d5e5; cursor:pointer;}
  .btn-summary{background:#f0fdfa; color:#0f766e; border:1px solid #5eead4; cursor:pointer; font-weight:700;}

  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: #fff; padding: 15px; border-radius: 14px; border: 1px solid var(--border); text-align: center; }
  .stat-val { font-size: 24px; font-weight: 700; color: var(--accent); display: block; }
  .stat-label { font-size: 13px; color: var(--mut); font-weight: 600; }

  table{width:100%; border-collapse:collapse; margin-top:10px; background:#fff; border-radius:12px; overflow:hidden}
  th,td{padding:12px 14px; border-bottom:1px solid var(--border); text-align:left; vertical-align:top; font-size:15px}
  th{background:linear-gradient(180deg,#f7fbff,#f2f8ff); color:#0b3a4f; font-weight:700; position:sticky; top:0; z-index:1}

  .badge{ padding:6px 12px; border-radius:999px; font-size:13px; font-weight:700; display:inline-block }
  .ok{ color:var(--ok); background:var(--okbg); border:1px solid #a7f3d090;}
  .warn{ color:var(--warn); background:var(--warnbg); border:1px solid #fde68a80;}
  .exp{ color:var(--exp); background:var(--expbg); border:1px solid #fecaca90;}

  .flag-base { display: inline-block; padding: 3px 10px; border-radius: 6px; font-weight: 600; font-size: 12px; margin: 2px; border: 1px solid; }
  .flag-combined { background: #f5f3ff; color: #5b21b6; border-color: #ddd6fe; } 
  .flag-possession { background: #eff6ff; color: #1e40af; border-color: #bfdbfe; } 
  .flag-hazard { background: #fffbeb; color: #92400e; border-color: #fde68a; } 

  .note-section { margin-top: 8px; border-top: 1px dashed #e2e8f0; padding-top: 8px; font-size: 13px; color: #475569; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="row">
      <div style="font-size:32px">🍯</div>
      <div>
        <h2 style="margin:0">สวัสดีค่ะคุณ <span id="headerName">ลูกค้า</span> 👋</h2>
        <p class="mut" style="margin:0">แอดมินน้ำผึ้ง 🍯 ยินดีให้บริการค่ะ</p>
      </div>
    </div>
    <div class="row" style="margin-top:15px">
      <input id="code" placeholder="ใส่รหัสลูกค้า เช่น RG-1234">
      <button class="btn" id="enterBtn">เข้าดูข้อมูล</button>
    </div>
    <div id="err" style="color:#b91c1c; margin-top:8px"></div>
  </div>

  <div id="dataCard" style="display:none">
    <div class="stat-grid">
      <div class="stat-card"><span class="stat-label">✅ ใบอนุญาตผลิต</span><span id="count-ผลิต" class="stat-val">0</span></div>
      <div class="stat-card"><span class="stat-label">📘 ใบอนุญาตครอบครอง</span><span id="count-ครอบครอง" class="stat-val">0</span></div>
      <div class="stat-card"><span class="stat-label">⚠️ ใบรับแจ้งผลิต ชนิดที่ 2</span><span id="count-ชนิด2" class="stat-val">0</span></div>
      <div class="stat-card"><span class="stat-label">🟣 ใบรับแจ้งครอบครอง ชนิดที่2</span><span id="count-รวม" class="stat-val">0</span></div>
    </div>

    <div class="card">
      <div class="row">
        <div>
          <div class="mut">บริษัทของคุณ</div>
          <div id="companyName" style="font-weight:700; font-size:20px"></div>
        </div>
        <div class="spacer"></div>
        <input id="q" placeholder="ค้นหาชื่อสินค้า/เลขทะเบียน..." style="min-width:260px">
        <button class="btn" id="refreshBtn">รีเฟรช</button>
        <button class="btn-summary" id="toSummaryBtn">ดูสรุปสถานะทั้งหมด</button>
      <button class="btn-ghost" id="exportBtn" style="border-color:#10b981; color:#059669;">📥 ดาวน์โหลด Excel</button>
      </div>

      <div class="row" style="margin-top:15px; gap:8px">
        <div class="mut" style="font-weight:600">กรองข้อมูล:</div>
        <button class="btn-ghost filter-btn" data-filter="ผลิต">✅ ใบอนุญาตผลิต</button>
        <button class="btn-ghost filter-btn" data-filter="ครอบครอง">📘 ใบอนุญาตครอบครอง</button>
        <button class="btn-ghost filter-btn" data-filter="ชนิด2">⚠️ ใบรับแจ้งผลิต ชนิดที่2</button>
        <button class="btn-ghost filter-btn" data-filter="รวม">🟣 ใบรับแจ้งครอบครอง ชนิดที่2</button>
        <button class="btn-ghost filter-btn" data-filter="ปัญหา">🚧 ติดปัญหา</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>ลำดับ</th>
            <th>ชื่อการค้า / ชื่อสามัญ</th>
            <th>ทะเบียน / ใบอนุญาต</th>
            <th>วันหมดอายุ</th>
            <th>สถานะและหมายเหตุ</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://qmugpalgcktfwixqepti.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtdWdwYWxnY2t0ZndpeHFlcHRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg4NzI3NjcsImV4cCI6MjA3NDQ0ODc2N30.cIOCbJAr8_Gbg8d5IxpTQZKVRgl1ETN1hyBgL2_LveA";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const $ = (id) => document.getElementById(id);

let FULL_ROWS = [], FILTERED = [], CURRENT_FILTER = null;

// ฟังก์ชันจัดรูปแบบวันที่ พ.ศ.
function fmtDateBE(d){
  if(!d) return '-';
  const t = new Date(d);
  return t.toLocaleDateString('th-TH-u-ca-buddhist', { year:'numeric', month:'long', day:'numeric' });
}

// แยกประเภทใบอนุญาต
function getCategory(row){
  const text = (row.renewed_note || '').toLowerCase() + ' ' + (row.license_no || '').toLowerCase();
  const hasPossession = text.includes('ครอบครอง');
  const hasHazard = text.includes('ชนิดที่ 2') || text.includes('ชนิดที่2');
  if(hasPossession && hasHazard) return 'รวม';
  if(hasPossession) return 'ครอบครอง';
  if(hasHazard) return 'ชนิด2';
  return 'ผลิต';
}

// อัปเดตตัวเลขสรุปด้านบน
function updateCounters(){
  const counts = { ผลิต:0, ครอบครอง:0, ชนิด2:0, รวม:0 };
  FULL_ROWS.forEach(r => {
    const cat = getCategory(r);
    if(counts[cat] !== undefined) counts[cat]++;
  });
  $('count-ผลิต').textContent = counts.ผลิต;
  $('count-ครอบครอง').textContent = counts.ครอบครอง;
  $('count-ชนิด2').textContent = counts.ชนิด2;
  $('count-รวม').textContent = counts.รวม;
}

// จัดการ Badge สถานะ
function statusBadge(row){
  const st = row.renewed_status || '';
  if(st.includes('ดำเนินการแล้ว')) return '<span class="badge ok">ดำเนินการแล้ว</span>'; 

  let dayBadge = '';
  if(row.expiry_date) {
    const diff = Math.ceil((new Date(row.expiry_date) - new Date())/86400000);
    if(diff < 0) {
      dayBadge = `<span class="badge exp">หมดอายุ (${Math.abs(diff)} วัน)</span>`;
    } else if(diff <= 90) {
      dayBadge = `<span class="badge warn">ใกล้หมดอายุ (เหลือ ${diff} วัน)</span>`;
    } else {
      dayBadge = '<span class="badge ok">ปกติ</span>'; 
    }
  } else {
    dayBadge = '<span class="badge ok">ปกติ</span>';
  }

  if(st === 'รอการตอบกลับจากลูกค้า'){
    return `<span class="badge warn" style="background:#fef3c7; color:#92400e; border:1px solid #fcd34d">📢 รอการตอบกลับ</span> ${dayBadge}`;
  }
  if(st === 'ได้รับเอกสารแล้ว รอการต่ออายุ'){
    return `<span class="badge ok" style="background:#e0f2fe; color:#075985; border:1px solid #bae6fd">📄 ได้รับเอกสารแล้ว</span> ${dayBadge}`;
  }
  return dayBadge;
}

// วาดตาราง
function render(){
  const tb = $('tbody');
  tb.innerHTML = FILTERED.map((r,i)=>{
    const cat = getCategory(r);
    let chips = '';
    if(cat === 'รวม') chips = '<span class="flag-base flag-combined">ใบรับแจ้งครอบครอง ชนิดที่ 2</span>';
    else if(cat === 'ครอบครอง') chips = '<span class="flag-base flag-possession">📘 ใบอนุญาตครอบครอง</span>';
    else if(cat === 'ชนิด2') chips = '<span class="flag-base flag-hazard">ใบรับแจ้งผลิต ชนิดที่ 2</span>';

    return `
      <tr>
        <td>${i+1}</td>
        <td><b>${r.brand_name}</b><br><small class="mut">${r.common_label}</small></td>
        <td>ทบ: ${r.registration_no||'-'}<br><small style="color:var(--accent)">ใบอนุญาต: ${r.license_no||'-'}</small></td>
        <td>${fmtDateBE(r.expiry_date)}</td>
        <td>
          ${statusBadge(r)} ${chips}
          <div class="note-section" style="white-space: pre-line; ${r.renewed_status?.includes('ดำเนินการแล้ว') ? 'color:#059669; font-weight:600;' : ''}">
            ${r.renewed_note ? r.renewed_note.split('\n').map(line => `<div>• ${line.trim()}</div>`).join('') : '<span class="mut" style="font-size:11px;">ไม่มีหมายเหตุ</span>'}
          </div>
        </td>
      </tr>
    `;
  }).join('');
}

// ค้นหา กรอง และเรียงลำดับ
function applyFilter(){
  const search = ($('q').value || '').toLowerCase();
  
  let result = FULL_ROWS.filter(r => {
    const cat = getCategory(r);
    const text = (r.brand_name + r.common_label + r.registration_no + r.license_no + (r.renewed_note||'')).toLowerCase();
    let passFilter = true;
    if(CURRENT_FILTER) {
      if(CURRENT_FILTER === 'ปัญหา') passFilter = text.includes('ปัญหา');
      else passFilter = (cat === CURRENT_FILTER);
    }
    return passFilter && text.includes(search);
  });

  // การเรียงลำดับ (เหมือนหน้าเว็บ)
  result.sort((a, b) => {
    const getPriority = (row) => {
      const st = row.renewed_status || '';
      const diff = row.expiry_date ? Math.ceil((new Date(row.expiry_date) - new Date())/86400000) : 999;
      if (diff < 0) return 1; // หมดอายุ
      if (diff <= 90) return 2; // ใกล้หมดอายุ
      if (st === 'รอการตอบกลับจากลูกค้า' || (row.renewed_note && row.renewed_note.includes('ปัญหา'))) return 3; 
      if (st.includes('ดำเนินการแล้ว')) return 5; // ท้ายสุด
      return 4; // ปกติ
    };
    return getPriority(a) - getPriority(b);
  });

  FILTERED = result;
  render();
}

// โหลดข้อมูล
async function loadData(){
  const code = ($('code').value || '').trim().toUpperCase();
  if(!code) return ($('err').textContent = 'กรุณากรอกรหัสลูกค้า');
  $('err').textContent = 'กำลังตรวจสอบรหัส... ⏳';
  try {
    const { data, error: dataErr } = await sb.rpc('get_company_portal', { p_plain_code: code });
    if(dataErr) throw dataErr;
    if(!data || data.length === 0) {
      $('err').textContent = '❌ ไม่พบรหัสลูกค้านี้';
      $('dataCard').style.display = 'none';
      return;
    }
    const realName = data[0].company_name || "ไม่พบชื่อบริษัท";
    $('companyName').textContent = realName;
    $('headerName').textContent = realName;
    FULL_ROWS = data;
    $('dataCard').style.display = 'block';
    $('err').textContent = '';
    updateCounters();
    applyFilter();
  } catch (err) {
    console.error(err);
    $('err').textContent = 'เกิดข้อผิดพลาดในการดึงข้อมูล';
  }
}

// --- ผูกปุ่มเข้ากับฟังก์ชัน (Event Listeners) ---
$('enterBtn').addEventListener('click', loadData);
$('refreshBtn').addEventListener('click', loadData);
$('q').addEventListener('input', applyFilter);
$('code').addEventListener('keypress', (e) => { if (e.key === 'Enter') loadData(); });

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', (e) => {
    const f = e.target.dataset.filter;
    CURRENT_FILTER = (CURRENT_FILTER === f) ? null : f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.replace('btn', 'btn-ghost'));
    if(CURRENT_FILTER) e.target.classList.replace('btn-ghost', 'btn');
    applyFilter();
  });
});

$('toSummaryBtn').addEventListener('click', () => {
  const code = ($('code').value || '').trim().toUpperCase();
  if(!code) return alert('กรุณาใส่รหัสลูกค้าก่อน');
  location.href = `summary.html?code=${encodeURIComponent(code)}`;
});

// ฟังก์ชัน Export Excel (ที่ปรับปรุงแล้ว)
$('exportBtn').addEventListener('click', () => {
  if (FILTERED.length === 0) return alert('ไม่มีข้อมูลให้ดาวน์โหลด');
  const excelData = FILTERED.map((r, index) => {
    let dayStatusText = 'ปกติ';
    if (r.expiry_date) {
      const diff = Math.ceil((new Date(r.expiry_date) - new Date()) / 86400000);
      if (diff < 0) dayStatusText = `หมดอายุแล้ว (${Math.abs(diff)} วัน)`;
      else if (diff <= 90) dayStatusText = `ใกล้หมดอายุ (เหลือ ${diff} วัน)`;
      else dayStatusText = `ปกติ`;
    }
    let finalStatus = (r.renewed_status && r.renewed_status.includes('ดำเนินการแล้ว')) 
      ? "ดำเนินการแล้ว" 
      : (r.renewed_status && r.renewed_status !== 'ปกติ') 
        ? `${r.renewed_status} / ${dayStatusText}` 
        : dayStatusText;

    return {
      "ลำดับ": index + 1,
      "ชื่อการค้า": r.brand_name,
      "ชื่อสามัญ": r.common_label,
      "เลขทะเบียน": r.registration_no || '-',
      "เลขใบอนุญาต": r.license_no || '-',
      "วันหมดอายุ": fmtDateBE(r.expiry_date),
      "ประเภทใบอนุญาต": getCategory(r),
      "สถานะปัจจุบัน": finalStatus,
      "หมายเหตุ": r.renewed_note || '-'
    };
  });
  const worksheet = XLSX.utils.json_to_sheet(excelData);
  worksheet['!cols'] = [{wch: 5}, {wch: 25}, {wch: 25}, {wch: 18}, {wch: 18}, {wch: 20}, {wch: 20}, {wch: 35}, {wch: 30}];
  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, "Customer_Data");
  const fileName = `ข้อมูลลูกค้า_${$('companyName').textContent}_${new Date().toLocaleDateString('th-TH').replace(/\//g, '-')}.xlsx`;
  XLSX.writeFile(workbook, fileName);
});
</script>
</body>
</html>
